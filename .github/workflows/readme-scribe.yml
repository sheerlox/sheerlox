name: Update README

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  markscribe:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: "sheerlox/readme-scribe2@327787a56833f4d3966a8ab413fe80a45bc5ed0b" # main
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          template: "templates/README.md.tpl"
          writeTo: "README.md"

      - uses: "sheerlox/readme-scribe2@327787a56833f4d3966a8ab413fe80a45bc5ed0b" # main
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          template: "templates/PREVIEW.md.tpl"
          writeTo: "PREVIEW.md"

      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: "docs(readme): update generated README"
          branch: main
          commit_user_name: Baymax the Scribe Robot 🤖
          commit_user_email: actions@github.com
          commit_author: Baymax the Scribe Robot 🤖 <actions@github.com>
